name: agent-ledger

services:
  agent-ledger:
    image: ghcr.io/zhenzhis/agent-ledger:latest
    container_name: agent-ledger
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:9800:9800"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      # - HTTPS_PROXY=http://your-proxy:port
    volumes:
      - type: bind
        source: ./data
        target: /data
        bind:
          create_host_path: true
      - type: bind
        source: ~/.claude/projects
        target: /sessions/claude
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ~/.codex/sessions
        target: /sessions/codex
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ~/.local/share/opencode
        target: /sessions/opencode
        read_only: true
        bind:
          create_host_path: false
      - ./config.docker.yaml:/etc/agent-ledger/config.yaml:ro
