name: agent-ledger

services:
  agent-ledger:
    image: agent-ledger:local
    container_name: agent-ledger
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:9800:9800"
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1
    volumes:
      - ./data:/data
      # WARNING: Only mount directories that exist on the host. Docker will auto-create
      # missing host directories as root, which breaks agent tools that rely on directory
      # presence/absence for detection (e.g. Kiro CLI, `npx skills add`).
      - ~/.claude/projects:/sessions/claude:ro
      - ~/.codex/sessions:/sessions/codex:ro
      - ~/.local/share/kiro-cli:/sessions/kiro-cli:ro
      - ~/.kiro/sessions/cli:/sessions/kiro-sessions:ro
