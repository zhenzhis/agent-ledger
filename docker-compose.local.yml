services:
  agent-usage:
    image: agent-usage:local
    container_name: agent-usage
    restart: unless-stopped
    user: "1000:1000"
    network_mode: host
    environment:
      - HTTP_PROXY=http://127.0.0.1:3067
      - HTTPS_PROXY=http://127.0.0.1:3067
      - NO_PROXY=localhost,127.0.0.1
    volumes:
      - ./data:/data
      - ~/.claude/projects:/sessions/claude:ro
      - ~/.codex/sessions:/sessions/codex:ro
